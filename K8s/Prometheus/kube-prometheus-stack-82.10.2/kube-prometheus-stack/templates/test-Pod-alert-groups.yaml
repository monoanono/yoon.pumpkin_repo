apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-pod-alert
  namespace: monitoring
  labels:
    release: test-prometheus
spec:
  groups:
    - name: k8s-pod-alerts
      rules:

        - alert: PodCrashLoopBackOff
          expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod CrashLoopBackOff"
            description: "{{ $labels.namespace }}/{{ $labels.pod }} is crashing"

        - alert: PodFrequentRestarts
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting frequently"

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 10m
          labels:
            severity: warning

        - alert: PodNotRunning
          expr: kube_pod_status_phase{phase!~"Running|Succeeded"} == 1
          for: 10m
          labels:
            severity: warning

        - alert: PodUnschedulable
          expr: kube_pod_status_unschedulable > 0
          for: 10m
          labels:
            severity: warning

    - name: k8s-node-alerts
      rules:

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="false"} == 1
          for: 5m
          labels:
            severity: critical

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning